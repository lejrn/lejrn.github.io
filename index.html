<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/github.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <title>GitHub Projects | TLRN </title>
    <meta name="description" content="A showcase of open-source projects by lejrn">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="container">
          <h1 class="header__title">GitHub Projects</h1>
          <p class="header__subtitle">Open-source work by TLRN</p>
          <p class="header__updated" id="last-updated"></p>
        </div>
      </header>

      <main class="main">
        <div class="container">
          <div class="toolbar" id="toolbar" style="display:none"></div>

          <div class="loading" id="loading">
            <div class="loading__spinner"></div>
            <p>Loading projects…</p>
          </div>

          <div class="repos-grid" id="repos-grid"></div>

          <div class="error" id="error">
            <h2>Something went wrong</h2>
            <p>Unable to load repositories.</p>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="container">
          <p>&copy; 2026 lejrn</p>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
